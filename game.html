<!DOCTYPE html>
<html>
<head>
<title>Ancient Temple Escape</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white text-center">

<h1 class="text-4xl font-bold text-yellow-400 mt-6">
Ancient Temple Escape
</h1>

<p class="mt-4 text-gray-300">
Solve puzzles and escape the temple!
</p>


<div class="mt-10">

<h2 id="levelTitle" class="text-2xl text-yellow-400 mb-4">
Level 1: Temple Entrance
</h2>

<p id="question" class="text-gray-300 mb-4">
I speak without a mouth and hear without ears. What am I?
</p>

<input id="answerInput" type="text"
class="p-2 text-black rounded"
placeholder="Enter your answer">

<br><br>

<button onclick="checkAnswer()"
class="bg-yellow-400 text-black px-4 py-2 rounded hover:bg-yellow-300">
Submit Answer
</button>

<p id="result" class="mt-4 font-bold"></p>

</div>


<div class="mt-10 hidden" id="badgeSection">
<h2 class="text-3xl text-yellow-400">🏆 Explorer Badge Unlocked!</h2>
</div>


<div id="animation"
class="hidden text-6xl mt-6 animate-bounce">
✨
</div>

<script>

let level = 1;

const levels = [
{
question: "I speak without a mouth and hear without ears. What am I?",
answer: "echo",
title: "Level 1: Temple Entrance"
},
{
question: "What has keys but can't open locks?",
answer: "piano",
title: "Level 2: Hidden Chamber"
},
{
question: "What runs but never walks?",
answer: "water",
title: "Level 3: Final Puzzle"
}
];

function checkAnswer() {
let input = document.getElementById("answerInput").value.toLowerCase();
let correct = levels[level - 1].answer;

if (input === correct) {

document.getElementById("result").innerText = "Correct! 🎉";
document.getElementById("result").classList.add("text-green-400");


let anim = document.getElementById("animation");
anim.classList.remove("hidden");

setTimeout(() => {
anim.classList.add("hidden");
nextLevel();
}, 1500);

} else {
document.getElementById("result").innerText = "Try Again ❌";
document.getElementById("result").classList.add("text-red-400");
}
}

function nextLevel() {
level++;

if (level > levels.length) {
document.getElementById("levelTitle").innerText = "You Escaped! 🎉";
document.getElementById("question").style.display = "none";
document.getElementById("answerInput").style.display = "none";


document.getElementById("badgeSection").classList.remove("hidden");

} else {
document.getElementById("levelTitle").innerText = levels[level - 1].title;
document.getElementById("question").innerText = levels[level - 1].question;
document.getElementById("answerInput").value = "";
document.getElementById("result").innerText = "";
}
}

</script>

</body>
</html>
